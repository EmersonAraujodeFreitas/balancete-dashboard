<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Fiscal Ajustado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
.card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kpi { font-size: 18px; font-weight: bold; }
</style>
</head>
<body>

<h1>📊 Dashboard Fiscal (Sem IA)</h1>

<div class="card">
<input type="file" id="fileInput" multiple>
<button onclick="processar()">Analisar Balancetes</button>
</div>

<div class="grid">
<div class="card kpi" id="receita"></div>
<div class="card kpi" id="despesa"></div>
<div class="card kpi" id="resultado"></div>
<div class="card kpi" id="meses"></div>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<pre id="relatorio"></pre>
</div>

<script>
let dados = [];
let chart;

async function processar() {
  dados = [];

  const files = document.getElementById('fileInput').files;

  for (let file of files) {
    await lerPDF(file);
  }

  gerarDashboard();
}

async function lerPDF(file) {
  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;

      let texto = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        content.items.forEach(item => texto += item.str + " ");
      }

      analisarTexto(texto, file.name);
      resolve();
    };

    reader.readAsArrayBuffer(file);
  });
}

function extrairMes(nome) {
  const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  nome = nome.toLowerCase();

  for (let m of meses) {
    if (nome.includes(m)) return m.toUpperCase();
  }

  return "MÊS " + (dados.length + 1);
}

function extrairValor(texto, regex) {
  const match = texto.match(regex);
  if (!match) return 0;

  return parseFloat(match[1].replace(/\./g, "").replace(",", "."));
}

function analisarTexto(texto, nome) {
  // 🔥 EXTRAÇÃO CORRETA (baseado no seu PDF real)
  const receitas = extrairValor(texto, /TOTAL DE RECEITAS:\\s*([\\d.,]+)/i);
  const despesas = extrairValor(texto, /TOTAL DE DESPESAS:\\s*([\\d.,]+)/i);

  const resultado = receitas - despesas;

  dados.push({
    mes: extrairMes(nome),
    receitas,
    despesas,
    resultado
  });
}

function gerarDashboard() {
  let totalReceita = dados.reduce((a,b)=>a+b.receitas,0);
  let totalDespesa = dados.reduce((a,b)=>a+b.despesas,0);
  let totalResultado = totalReceita - totalDespesa;

  document.getElementById("receita").innerText = "💰 Receita: R$ " + totalReceita.toFixed(2);
  document.getElementById("despesa").innerText = "💸 Despesa: R$ " + totalDespesa.toFixed(2);
  document.getElementById("resultado").innerText = "📊 Resultado: R$ " + totalResultado.toFixed(2);
  document.getElementById("meses").innerText = "📅 Meses: " + dados.length;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: 'line',
    data: {
      labels: dados.map(d=>d.mes),
      datasets: [
        { label: "Receita", data: dados.map(d=>d.receitas) },
        { label: "Despesa", data: dados.map(d=>d.despesas) },
        { label: "Resultado", data: dados.map(d=>d.resultado) }
      ]
    }
  });

  gerarRelatorio();
}

function gerarRelatorio() {
  let texto = "📊 RELATÓRIO PARA SÍNDICO\\n\\n";

  dados.forEach((m, i) => {
    texto += `📅 ${m.mes}\\n`;
    texto += `Receita: R$ ${m.receitas.toFixed(2)}\\n`;
    texto += `Despesa: R$ ${m.despesas.toFixed(2)}\\n`;
    texto += `Resultado: R$ ${m.resultado.toFixed(2)}\\n`;

    if (m.resultado < 0) {
      texto += "❌ PREJUÍZO DETECTADO\\n";
    }

    if (i > 0) {
      let variacao = m.resultado - dados[i-1].resultado;
      texto += `📈 Variação: ${variacao.toFixed(2)}\\n`;
    }

    texto += "\\n";
  });

  texto += "🚨 ANÁLISE\\n";

  if (dados.some(m => m.resultado < 0)) {
    texto += "- Existem meses com prejuízo\\n";
  }

  texto += "- Monitorar despesas mensais\\n";
  texto += "- Avaliar contratos e custos fixos\\n";

  document.getElementById("relatorio").innerText = texto;
}
</script>

</body>
</html>
