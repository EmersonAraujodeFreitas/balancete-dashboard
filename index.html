<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Fiscal PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
.card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.kpi { font-size: 20px; font-weight: bold; }
</style>
</head>
<body>

<h1>📊 Dashboard Fiscal PRO</h1>

<div class="card">
<input type="file" id="fileInput" multiple>
<button onclick="processar()">Analisar PDFs</button>
</div>

<div class="grid">
<div class="card kpi" id="receita"></div>
<div class="card kpi" id="despesa"></div>
<div class="card kpi" id="resultado"></div>
</div>

<div class="card">
<canvas id="graficoLinha"></canvas>
</div>

<div class="card">
<canvas id="graficoBarra"></canvas>
</div>

<div class="card">
<pre id="relatorio"></pre>
</div>

<script>
let dados = [];
let categorias = {
  energia: 0,
  agua: 0,
  manutencao: 0,
  folha: 0,
  outros: 0
};

async function processar() {
  const files = document.getElementById('fileInput').files;

  for (let file of files) {
    await lerPDF(file);
  }

  gerarDashboard();
}

async function lerPDF(file) {
  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;

      let texto = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        content.items.forEach(item => texto += item.str + " ");
      }

      analisarTexto(texto, file.name);
      resolve();
    };

    reader.readAsArrayBuffer(file);
  });
}

function extrairMes(nome) {
  const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  nome = nome.toLowerCase();

  for (let m of meses) {
    if (nome.includes(m)) return m.toUpperCase();
  }

  return "MÊS " + (dados.length + 1);
}

function classificar(texto, valor) {
  texto = texto.toLowerCase();

  if (texto.includes("energia")) categorias.energia += valor;
  else if (texto.includes("agua")) categorias.agua += valor;
  else if (texto.includes("manut")) categorias.manutencao += valor;
  else if (texto.includes("salario") || texto.includes("folha")) categorias.folha += valor;
  else categorias.outros += valor;
}

function analisarTexto(texto, nome) {
  const valores = texto.match(/\d+[.,]\d+/g) || [];

  let receitas = 0;
  let despesas = 0;

  valores.forEach((v, i) => {
    const valor = parseFloat(v.replace(",", "."));
    if (!isNaN(valor)) {
      if (i % 2 === 0) receitas += valor;
      else {
        despesas += valor;
        classificar(texto, valor);
      }
    }
  });

  const resultado = receitas - despesas;

  dados.push({
    mes: extrairMes(nome),
    receitas,
    despesas,
    resultado
  });
}

function gerarDashboard() {
  let totalReceita = dados.reduce((a,b)=>a+b.receitas,0);
  let totalDespesa = dados.reduce((a,b)=>a+b.despesas,0);
  let totalResultado = totalReceita - totalDespesa;

  document.getElementById("receita").innerText = "💰 Receita: R$ " + totalReceita.toFixed(2);
  document.getElementById("despesa").innerText = "💸 Despesa: R$ " + totalDespesa.toFixed(2);
  document.getElementById("resultado").innerText = "📊 Resultado: R$ " + totalResultado.toFixed(2);

  new Chart(document.getElementById("graficoLinha"), {
    type: 'line',
    data: {
      labels: dados.map(d=>d.mes),
      datasets: [
        { label: "Receita", data: dados.map(d=>d.receitas) },
        { label: "Despesa", data: dados.map(d=>d.despesas) }
      ]
    }
  });

  new Chart(document.getElementById("graficoBarra"), {
    type: 'bar',
    data: {
      labels: Object.keys(categorias),
      datasets: [{
        label: "Despesas por Categoria",
        data: Object.values(categorias)
      }]
    }
  });

  gerarRelatorio(totalReceita, totalDespesa, totalResultado);
}

function gerarRelatorio(r, d, res) {
  let texto = "📊 RELATÓRIO INTELIGENTE\\n\\n";

  dados.forEach((m, i) => {
    texto += `${m.mes} → Resultado: R$ ${m.resultado.toFixed(2)}\\n`;

    if (m.resultado < 0) texto += "❌ Prejuízo\\n";

    if (i > 0) {
      let variação = m.resultado - dados[i-1].resultado;
      texto += `📈 Variação: ${variação.toFixed(2)}\\n`;
    }

    texto += "\\n";
  });

  texto += "📂 CATEGORIAS\\n";
  for (let c in categorias) {
    texto += `${c}: R$ ${categorias[c].toFixed(2)}\\n`;
  }

  texto += "\\n💡 INSIGHTS\\n";

  if (d > r * 0.9) texto += "- Despesas muito altas\\n";
  if (dados.some(m => m.resultado < 0)) texto += "- Existem meses com prejuízo\\n";

  texto += "- Maior categoria deve ser revisada\\n";

  document.getElementById("relatorio").innerText = texto;
}
</script>

</body>
</html>
