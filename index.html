<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Fiscal Completo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
.card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #334155; padding:8px; text-align:center; }
th { background:#334155; }
.alert { color:#f87171; }
.ok { color:#4ade80; }
</style>
</head>
<body>

<h1>📊 Análise Completa de Balancetes</h1>

<div class="card">
<input type="file" id="fileInput" multiple>
<button onclick="processar()">Analisar PDFs</button>
</div>

<div class="card">
<h2>📋 Tabela por Categoria</h2>
<div id="tabela"></div>
</div>

<div class="card">
<h2>📄 Diagnóstico</h2>
<pre id="relatorio"></pre>
</div>

<script>
let dados = {};
let meses = [];

const categoriasPadrao = [
  "PESSOAL",
  "SERVICOS",
  "ENERGIA",
  "MANUTENCAO",
  "CONSERVACAO",
  "OBRAS",
  "ADMIN",
  "IMOBILIZADO",
  "IMPOSTOS",
  "OUTROS"
];

async function processar() {
  dados = {};
  meses = [];

  const files = document.getElementById("fileInput").files;

  for (let file of files) {
    await lerPDF(file);
  }

  montarTabela();
  gerarRelatorio();
}

async function lerPDF(file) {
  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = async function() {
      const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

      let texto = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        content.items.forEach(item => texto += item.str + "\n");
      }

      analisarTexto(texto, file.name);
      resolve();
    };

    reader.readAsArrayBuffer(file);
  });
}

function extrairMes(nome) {
  const mesesNome = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  nome = nome.toLowerCase();

  for (let m of mesesNome) {
    if (nome.includes(m)) return m.toUpperCase();
  }

  return "MES_" + (meses.length + 1);
}

function detectarCategoria(linha) {
  linha = linha.toLowerCase();

  if (linha.includes("pessoal")) return "PESSOAL";
  if (linha.includes("serviço")) return "SERVICOS";
  if (linha.includes("energia")) return "ENERGIA";
  if (linha.includes("manutenção")) return "MANUTENCAO";
  if (linha.includes("conservação")) return "CONSERVACAO";
  if (linha.includes("obras")) return "OBRAS";
  if (linha.includes("administrativa")) return "ADMIN";
  if (linha.includes("imobilizado")) return "IMOBILIZADO";
  if (linha.includes("tributos")) return "IMPOSTOS";

  return "OUTROS";
}

function analisarTexto(texto, nome) {
  const mes = extrairMes(nome);
  meses.push(mes);

  dados[mes] = {};
  categoriasPadrao.forEach(c => dados[mes][c] = 0);

  const linhas = texto.split("\n");

  let categoriaAtual = "OUTROS";

  linhas.forEach(linha => {
    let catDetectada = detectarCategoria(linha);

    if (catDetectada !== "OUTROS") {
      categoriaAtual = catDetectada;
    }

    const valores = linha.match(/\d+[.,]\d+/g);

    if (valores) {
      valores.forEach(v => {
        let valor = parseFloat(v.replace(".", "").replace(",", "."));
        if (!isNaN(valor)) {
          dados[mes][categoriaAtual] += valor;
        }
      });
    }
  });
}

function montarTabela() {
  let html = "<table><tr><th>Categoria</th>";

  meses.forEach(m => html += `<th>${m}</th>`);

  html += "</tr>";

  categoriasPadrao.forEach(cat => {
    html += `<tr><td>${cat}</td>`;

    meses.forEach(m => {
      let valor = dados[m][cat] || 0;
      html += `<td>R$ ${valor.toFixed(2)}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("tabela").innerHTML = html;
}

function gerarRelatorio() {
  let texto = "📊 DIAGNÓSTICO\\n\\n";

  meses.forEach((m, i) => {
    let total = Object.values(dados[m]).reduce((a,b)=>a+b,0);

    texto += `${m}: Total despesas R$ ${total.toFixed(2)}\\n`;

    if (i > 0) {
      let prev = Object.values(dados[meses[i-1]]).reduce((a,b)=>a+b,0);
      let diff = total - prev;

      texto += `Variação: ${diff.toFixed(2)}\\n`;

      if (diff > 0) texto += "⚠️ Aumento de custo\\n";
    }

    texto += "\\n";
  });

  document.getElementById("relatorio").innerText = texto;
}
</script>

</body>
</html>
